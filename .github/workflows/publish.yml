name: Publish

on:
  release:
    types: [published]
  workflow_dispatch:

# Trusted Publishing (npmjs.com OIDC):
#   This workflow uses npm Trusted Publishing — no long-lived NPM_TOKEN secret.
#   The OIDC id-token permission mints a short-lived token that:
#     1. Authorises the `npm publish` HTTP request
#     2. Signs the provenance attestation (SLSA Level 2+ via Sigstore)
#   Configure at npmjs.com → package settings → "Configure Trusted Publishing".
permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '>=20'
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck:all

      - name: Lint
        run: npm run lint

      - name: Test with coverage
        run: npm run test:coverage

      - name: Build
        run: npm run build

      - name: Verify dist output
        run: |
          test -f dist/cli.cjs
          test -f dist/cli.js
          test -f dist/cli.d.ts

      - name: Binary smoke test
        run: node dist/cli.cjs --help

      - name: Publish
        run: npm publish --provenance --access public
